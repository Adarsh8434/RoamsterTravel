server:
  port: 8001

spring:
  application:
    name: roamster-user-service

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/romaster?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rajanPA90()**}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate          # use Flyway for DDL; validate only
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: # Add the mail that sends the otp to user
    password: # Add the app-password
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:changeme-super-secret-key-min-32-chars!!}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:3600000}      # 1h
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}  # 7d



