server:
  port: 8001

spring:
  application:
    name: roamster-user-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/roamster_users}
    username: ${DB_USERNAME:roamster}
    password: ${DB_PASSWORD:roamster}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate          # use Flyway for DDL; validate only
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:changeme-super-secret-key-min-32-chars!!}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:3600000}      # 1h
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}  # 7d
