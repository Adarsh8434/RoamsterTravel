server:
  port: 8081

spring:
  application:
    name: clothing-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:roamster_clothing}
    username: ${DB_USER:roamster}
    password: ${DB_PASS:roamster}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host: /

# Inter-service REST calls (via Feign)
feign:
  client:
    config:
      ecommerce-service:
        url: ${ECOMMERCE_SERVICE_URL:http://ecommerce-service:8084}
      food-service:
        url: ${FOOD_SERVICE_URL:http://food-service:8082}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.roamster.clothing: DEBUG
    org.springframework.amqp: INFO
